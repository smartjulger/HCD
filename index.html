<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <video id="video" controls preload="metadata">
      <source src="mp4/the-office-clips.mp4" type="video/mp4" />
      <track
        label="English"
        kind="subtitles"
        srclang="en"
        src="mp4/the-office-clips.vtt"
        default
      />
    </video>

    <div class="subtitle-controls">
      <label>Ondertitel grootte:</label>
      <button onclick="changeSize(-2)">−</button>
      <span id="sizeLabel">30px</span>
      <button onclick="changeSize(2)">+</button>
    </div>
    <script src="main.js"></script>
  </body>
</html>
