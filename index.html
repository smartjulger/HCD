<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bioscoop voor doven</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div class="cinema-wrapper">

      <div class="top-controls">
        <select id="videoSelect">
          <option value="testmp4">Nederlands voetbal</option>
          <option value="office">The Office</option>
        </select>
        <button id="glowBtn">Glow: aan</button>
        <button id="fullscreenBtn">Volledig scherm</button>
      </div>

      <div class="video-container" id="videoContainer">
        <video id="video" controls preload="metadata"></video>
        <div id="subtitleOverlay" class="subtitle-overlay"></div>
      </div>

      <div class="bottom-controls">
        <label>Ondertitel grootte:</label>
        <button id="sizeDown">−</button>
        <span id="sizeLabel">16px</span>
        <button id="sizeUp">+</button>
      </div>

    </div>
    <script src="main.js"></script>
  </body>
</html>
